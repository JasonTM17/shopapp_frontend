name: Bug report
description: File a bug report to help us improve ShopApp Angular.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting an issue. Please provide enough detail so we can reproduce it.
  - type: textarea
    id: summary
    attributes:
      label: Bug summary
      description: What is happening?
      placeholder: Describe the issue clearly.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps to trigger the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should happen instead?
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser/OS/Node version
      placeholder: e.g. Chrome 145, Windows 10, Node 20
