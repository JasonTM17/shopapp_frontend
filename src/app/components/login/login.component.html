<app-header></app-header>
<main class="auth-page">
    <div class="container auth-container">
        <div class="row justify-content-center">
            <div class="col-12 col-md-10 col-lg-6">
                <div class="auth-card login-form mx-auto">
                    <form #loginForm="ngForm">
                    <h2 class="login-header">Đăng nhập</h2>
                    <p class="auth-subtitle">Chào mừng bạn quay lại với ShopApp.</p>

                    <div class="form-group mb-3">
                        <label for="phoneNumber">Số điện thoại</label>
                        <input
                            type="text"
                            class="form-control"
                            [(ngModel)]="phoneNumber"
                            (input)="onPhoneNumberChange()"
                            name="phone"
                            (focus)="loginForm.form.markAsTouched()"
                            id="phoneNumber"
                            placeholder="Nhập số điện thoại"
                        >
                    </div>

                    <div class="form-group mb-3 password-field">
                        <label for="password">Mật khẩu</label>
                        <input
                            [type]="showPassword ? 'text' : 'password'"
                            [(ngModel)]="password"
                            name="password"
                            placeholder="Ít nhất 3 ký tự"
                            class="form-control"
                            id="password"
                        >
                        <i
                            class="password-toggle fa"
                            [ngClass]="showPassword ? 'fa-eye' : 'fa-eye-slash'"
                            (click)="togglePassword()"
                        ></i>
                    </div>

                    <div class="form-group mb-3">
                        <div class="form-check checkbox-text">
                            <span class="remember-group">
                                <input type="checkbox" class="form-check-input" id="remember" [(ngModel)]="rememberMe">
                                <label class="form-check-label text-start" for="remember">Ghi nhớ đăng nhập</label>
                            </span>
                            <a href="#" class="register-link">Quên mật khẩu</a>
                        </div>
                    </div>

                    <div class="form-group mb-2">
                        <select class="form-control access-right" [(ngModel)]="selectedRole">
                            <option selected disabled>Quyền đăng nhập</option>
                            @for(role of roles; track role.name) {
                                <option [ngValue]="role">
                                    {{ role.name }}
                                </option>
                            }
                        </select>
                    </div>

                    <button type="button" (click)="login()" class="login-button">Đăng nhập</button>

                    <div class="divider"></div>

                    <div class="social-login-buttons">
                        <button type="button" (click)="loginWithGoogle()" class="social-button google-button">
                            Đăng nhập với Google
                        </button>
                        <button type="button" (click)="loginWithFacebook()" class="social-button facebook-button">
                            Đăng nhập với Facebook
                        </button>
                    </div>

                    <p class="text-center mt-3 mb-0">
                        Bạn chưa đăng ký?
                        <a class="register-link" (click)="createAccount()">Tạo tài khoản</a>
                    </p>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>
<app-footer></app-footer>
