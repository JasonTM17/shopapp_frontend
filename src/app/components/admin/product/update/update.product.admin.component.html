<section class="admin-form-page">
  <div class="form-card">
    <h3>Cập nhật sản phẩm</h3>
    <p class="subtitle">Điều chỉnh thông tin, danh mục và quản lý ảnh hiện có của sản phẩm.</p>

    <form (ngSubmit)="updateProduct()" enctype="multipart/form-data">
      <div class="form-group mb-3">
        <label for="name">Tên sản phẩm</label>
        <input type="text" id="name" [(ngModel)]="updatedProduct.name" name="name" class="form-control" required>
      </div>

      <div class="form-group mb-3">
        <label for="price">Giá bán</label>
        <input type="text" id="price" [(ngModel)]="updatedProduct.price" name="price" class="form-control" required>
      </div>

      <div class="form-group mb-3">
        <label for="description">Mô tả</label>
        <textarea id="description" [(ngModel)]="updatedProduct.description" name="description" class="form-control" required></textarea>
      </div>

      <div class="form-group mb-3">
        <label for="category">Danh mục</label>
        <select id="category" [(ngModel)]="updatedProduct.category_id" name="category" class="form-control" required>
          @for(category of categories; track category.id) {
            <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
      </div>

      <div class="form-group mb-3">
        <label for="images">Thêm ảnh mới (tối đa 5 ảnh)</label>
        <input type="file" id="images" name="images" class="form-control" multiple (change)="onFileChange($event)" accept="image/*">
      </div>

      <button type="submit" class="btn btn-primary">Lưu cập nhật</button>
    </form>
  </div>

  <div class="image-panel">
    <div class="panel-head">
      <h4>Ảnh sản phẩm hiện tại</h4>
    </div>
    <div class="image-grid">
      @for(image of product.product_images; track image.id) {
        <article class="image-card">
          <img [src]="image.image_url" alt="Product Image">
          <button class="btn btn-outline-danger btn-sm" (click)="deleteImage(image)">Xóa ảnh</button>
        </article>
      }
    </div>
  </div>
</section>
