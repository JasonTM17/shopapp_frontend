<section class="admin-form-page">
  <div class="form-card">
    <h3>Thêm sản phẩm mới</h3>
    <p class="subtitle">Nhập thông tin sản phẩm và ảnh minh họa để hiển thị lên cửa hàng.</p>

    <form (ngSubmit)="insertProduct()" enctype="multipart/form-data">
      <div class="form-group mb-3">
        <label for="name">Tên sản phẩm</label>
        <input type="text" id="name" [(ngModel)]="insertProductDTO.name" name="name" class="form-control" required>
      </div>

      <div class="form-group mb-3">
        <label for="price">Giá bán</label>
        <input type="text" id="price" [(ngModel)]="insertProductDTO.price" name="price" class="form-control" required>
      </div>

      <div class="form-group mb-3">
        <label for="description">Mô tả</label>
        <textarea id="description" [(ngModel)]="insertProductDTO.description" name="description" class="form-control" required></textarea>
      </div>

      <div class="form-group mb-3">
        <label for="category">Danh mục</label>
        <select id="category" [(ngModel)]="insertProductDTO.category_id" name="category" class="form-control" required>
          @for(category of categories; track category.id) {
            <option [value]="category.id">{{ category.name }}</option>
          }
        </select>
      </div>

      <div class="form-group mb-3">
        <label for="images">Ảnh sản phẩm (tối đa 5 ảnh)</label>
        <input type="file" id="images" name="images" class="form-control" multiple (change)="onFileChange($event)" accept="image/*">
      </div>

      <button type="submit" class="btn btn-primary">Thêm sản phẩm</button>
    </form>
  </div>
</section>
