<div class="container-fluid">
    <header class="header d-flex justify-content-between align-items-center">
      <div>
        <h1 class="header-title">Admin Dashboard</h1>
        <p class="header-subtitle mb-0">Quản trị đơn hàng, danh mục, sản phẩm và người dùng.</p>
      </div>
      <button class="btn btn-danger btn-sm logout-btn" (click)="logout()">Đăng xuất</button>
    </header>
    <div class="row">
      <nav id="sidebar" class="col-md-3 col-lg-2 d-md-block sidebar">
        <div class="position-sticky">
          <ul class="nav flex-column">
            <li class="nav-item">
              <a class="nav-link" 
                (click)="showAdminComponent('orders')"
                routerLink="/admin/orders"
                routerLinkActive="active">
                <i class="fa fa-first-order icon"></i>Orders
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" 
                (click)="showAdminComponent('categories')"
                  routerLink="/admin/categories"
                  routerLinkActive="active">
                <i class="fa fa-leaf icon"></i>Categories
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" 
                (click)="showAdminComponent('products')"
                routerLink="/admin/products"
                routerLinkActive="active">
                <i class="fa fa-codepen icon"></i>Products
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link" 
                (click)="showAdminComponent('users')"
                routerLink="/admin/users"
                routerLinkActive="active">
                <i class="fa fa-users icon"></i>Users
              </a>
            </li>
          </ul>
        </div>
      </nav>
      <div class="col-md-9 col-lg-10 overflow-auto admin-content">
        <router-outlet></router-outlet>
      </div>
    </div>
  </div>
