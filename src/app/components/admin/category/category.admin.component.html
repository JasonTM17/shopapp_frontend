<section class="admin-panel">
  <div class="panel-head">
    <h2>Quản lý danh mục</h2>
    <p>Tạo và cập nhật danh mục sản phẩm theo chiến lược bán hàng.</p>
  </div>

  <div class="panel-toolbar">
    <button class="btn btn-success" (click)="insertCategory()">Thêm danh mục mới</button>
  </div>

  <div class="table-wrap">
    <table class="table app-table align-middle mb-0">
      <thead>
        <tr>
          <th>ID</th>
          <th>Tên danh mục</th>
          <th>Hành động</th>
        </tr>
      </thead>
      <tbody>
        @for(category of categories; track category.id) {
          <tr>
            <td>#{{ category.id }}</td>
            <td class="fw-semibold">{{ category.name }}</td>
            <td>
              <div class="action-group">
                <button class="btn btn-sm btn-primary" (click)="updateCategory(category.id)">Sửa</button>
                <button class="btn btn-sm btn-danger" (click)="deleteCategory(category)">Xóa</button>
              </div>
            </td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="empty-state">Chưa có danh mục nào.</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</section>
