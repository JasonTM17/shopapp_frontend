@if(updatedCategory) {
  <section class="admin-form-page">
    <div class="form-card">
      <h3>Cập nhật danh mục</h3>
      <p class="subtitle">Điều chỉnh tên danh mục để đồng bộ hệ thống sản phẩm.</p>

      <form (ngSubmit)="updateCategory()">
        <div class="form-group mb-3">
          <label for="name">Tên danh mục</label>
          <input type="text" id="name" [(ngModel)]="updatedCategory.name" name="name" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Lưu thay đổi</button>
      </form>
    </div>
  </section>
}
